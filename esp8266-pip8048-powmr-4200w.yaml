substitutions:
  name: powmr-4200w
  external_components_source: github://syssi/esphome-pipsolar@main
  tx_pin: GPIO4
  rx_pin: GPIO5

esphome:
  name: ${name}
  friendly_name: ${name}
  project:
    name: "syssi.esphome-pipsolar@main"
    version: 1.0.0

esp8266:
  board: d1_mini

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome

logger:
  baud_rate: 0
  level: DEBUG

# If you use Home Assistant please remove this `mqtt` section and uncomment the `api` component!
# The native API has many advantages over MQTT: https://esphome.io/components/api.html#advantages-over-mqtt
mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
  id: mqtt_client

# api:

uart:
  id: uart_0
  baud_rate: 2400
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
#  debug:
#    direction: BOTH
#    dummy_receiver: false
#    after:
#      delimiter: "\r"
#    sequence:
#      - lambda: UARTDebug::log_string(direction, bytes);

pip8048:
  uart_id: uart_0
  id: inverter0

sensor:
  - platform: pip8048
    pipsolar_id: inverter0
    # QPIRI
    grid_rating_voltage:
      name: "grid rating voltage"
    grid_rating_current:
      name: "grid rating current"
    ac_output_rating_voltage:
      name: "ac output rating voltage"
    ac_output_rating_frequency:
      name: "ac output rating frequency"
    ac_output_rating_current:
      name: "ac output rating current"
    ac_output_rating_apparent_power:
      name: "ac output rating apparent power"
    ac_output_rating_active_power:
      name: "ac output rating active power"
    battery_rating_voltage:
      name: "battery rating voltage"
    battery_recharge_voltage:
      name: "battery recharge voltage"
    battery_under_voltage:
      name: "battery under voltage"
    battery_bulk_voltage:
      name: "battery bulk voltage"
    battery_float_voltage:
      name: "battery float voltage"
    battery_type:
      name: "battery type"
    current_max_ac_charging_current:
      name: "current max ac charging current"
    current_max_charging_current:
      name: "current max charging current"
    input_voltage_range:
      name: "input voltage range"
    output_source_priority:
      name: "output source priority"
    charger_source_priority:
      name: "charger source priority"
    parallel_max_num:
      name: "parallel max num"
    machine_type:
      name: "machine type"
    topology:
      name: "topology"
    output_mode:
      name: "output mode"
    battery_redischarge_voltage:
      name: "battery redischarge voltage"
    pv_ok_condition_for_parallel:
      name: "pv ok condition for parallel"
    pv_power_balance:
      name: "pv power balance"

    # QPIGS
    grid_voltage:
      name: "grid voltage"
    grid_frequency:
      name: "grid frequency"
    ac_output_voltage:
      name: "ac output voltage"
    ac_output_frequency:
      name: "ac output frequency"
    ac_output_apparent_power:
      name: "ac output apparent power"
    ac_output_active_power:
      name: "ac output active power"
    output_load_percent:
      name: "output load percent"
    bus_voltage:
      name: "bus voltage"
    battery_voltage:
      name: "battery voltage"
    battery_charging_current:
      name: "battery charging current"
    battery_capacity_percent:
      name: "battery capacity percent"
    inverter_heat_sink_temperature:
      name: "inverter heat sink temperature"
    pv1_input_current:
      name: "pv1 input current"
    pv1_input_voltage:
      name: "pv1 input voltage"
    battery_voltage_scc:
      name: "battery voltage scc"
    battery_discharge_current:
      name: "battery discharge current"
    battery_voltage_offset_for_fans_on:
      name: "battery voltage offset for fans on"
#    eeprom_version:
#      name: "eeprom version"
    pv1_charging_power:
      name: "pv1 charging power"

    # QPIGS2 not supported by POWMR 4200W
#    pv2_input_current:
#      name: "pv2 input current"
#    pv2_input_voltage:
#      name: "pv2 input voltage"
#    pv2_charging_power:
#      name: "pv2 charging power"

text_sensor:
  - platform: pip8048
    pipsolar_id: inverter0
    device_mode:
      name: "device mode"
      filters:
        map:
          - P -> Power on mode
          - S -> Standby mode
          - L -> Line mode
          - B -> Battery mode
          - F -> Fault mode
          - D -> Shutdown mode
#    last_qpigs:
#      name: "last qpigs"
#    last_qpiri:
#      name: "last qpiri"
#    last_qmod:
#      name: "last qmod"
#    last_qflag:
#      name: "last qflag"
#    last_qpigs2:
#      name: "last qpigs2"
#    last_qbatcd:                  # not supported by POWMR 4200W
#      name: "last qbatcd"

binary_sensor:
  - platform: pip8048
    pipsolar_id: inverter0
    add_sbu_priority_version:
      name: "add sbu priority version"
    configuration_status:
      name: "configuration status"
#    scc_firmware_version:
#      name: "scc firmware version"
    load_status:
      name: "load status"
    battery_voltage_to_steady_while_charging:
      name: "battery voltage to steady while charging"
    charging_status:
      name: "charging status"
    scc_charging_status:
      name: "scc charging status"
    ac_charging_status:
      name: "ac charging status"
    charging_to_floating_mode:
      name: "charging to floating mode"
    switch_on:
      name: "switch on"
#    dustproof_installed:
#      name: "dustproof installed"
    silence_buzzer_open_buzzer:
      name: "silence buzzer open buzzer"
    overload_bypass_function:
      name: "overload bypass function"
    lcd_escape_to_default:
      name: "lcd escape to default"
    overload_restart_function:
      name: "overload restart function"
    over_temperature_restart_function:
      name: "over temperature restart function"
#    backlight_on:
#      name: "backlight on"
    # QBATCD sensors removed: not supported by POWMR 4200W
    # discharge_onoff, discharge_with_standby_onoff, charge_onoff

select:
  - platform: pip8048
    pipsolar_id: inverter0
    output_source_priority:
      name: "output source priority"
      optionsmap:
        "Utility first": "POP00"
        "Solar first": "POP01"
        "SBU first": "POP02"
      statusmap:
        "0": "Utility first"
        "1": "Solar first"
        "2": "SBU first"
    charger_source_priority:
      name: "charger source priority"
      optionsmap:
#        "Utility first": "PCP00"
        "Solar first": "PCP01"
        "Solar and utility": "PCP02"
        "Solar charging only": "PCP03"
      statusmap:
#        "0": "Utility first"
        "1": "Solar first"
        "2": "Solar and utility"
        "3": "Solar charging only"
    # POWMR 4200W: 3+4-digit MUCHGC format; QPIRI reports non-padded values
    current_max_ac_charging_current:
      name: "current max ac charging current"
      optionsmap:
        "10A": "MUCHGC010"
        "20A": "MUCHGC020"
        "30A": "MUCHGC030"
        "40A": "MUCHGC040"
        "50A": "MUCHGC050"
        "60A": "MUCHGC060"
        "70A": "MUCHGC070"
        "80A": "MUCHGC080"
        "90A": "MUCHGC090"
        "100A": "MNCHGC0100"
      statusmap:
        "10": "10A"
        "20": "20A"
        "30": "30A"
        "40": "40A"
        "50": "50A"
        "60": "60A"
        "70": "70A"
        "80": "80A"
        "90": "90A"
        "100": "100A"
    current_max_charging_current:
      name: "current max charging current"
      optionsmap:
        "10A": "MCHGC010"
        "20A": "MCHGC020"
        "30A": "MCHGC030"
        "40A": "MCHGC040"
        "50A": "MCHGC050"
        "60A": "MCHGC060"
        "70A": "MCHGC070"
        "80A": "MCHGC080"
        "90A": "MCHGC090"
        "100A": "MCHGC100"
        "110A": "MCHGC110"
        "120A": "MCHGC120"
      statusmap:
        "010": "10A"
        "020": "20A"
        "030": "30A"
        "040": "40A"
        "050": "50A"
        "060": "60A"
        "070": "70A"
        "080": "80A"
        "090": "90A"
        "100": "100A"
        "110": "110A"
        "120": "120A"
    # charging_discharging_control removed: requires QBATCD, not supported by POWMR 4200W
    battery_type:
      name: "battery type"
      optionsmap:
        "AGM": "PBT00"
        "Flooded": "PBT01"
        "User": "PBT02"
        "Pylontech": "PBT09"
      statusmap:
        "0": "AGM"
        "1": "Flooded"
        "2": "User"
        "9": "Pylontech"
    battery_recharge_voltage:
      name: "battery recharge voltage"
      optionsmap:
        "44.0V": "PBCV44.0"
        "45.0V": "PBCV45.0"
        "46.0V": "PBCV46.0"
        "47.0V": "PBCV47.0"
        "48.0V": "PBCV48.0"
      statusmap:
        "44.0": "44.0V"
        "45.0": "45.0V"
        "46.0": "46.0V"
        "47.0": "47.0V"
        "48.0": "48.0V"
    battery_redischarge_voltage:
      name: "battery redischarge voltage"
      optionsmap:
        "48.0V": "PBDV48.0"
        "49.0V": "PBDV49.0"
        "50.0V": "PBDV50.0"
        "51.0V": "PBDV51.0"
      statusmap:
        "48.0": "48.0V"
        "49.0": "49.0V"
        "50.0": "50.0V"
        "51.0": "51.0V"
    battery_cutoff_voltage:
      name: "battery cutoff voltage"
      optionsmap:
        "40.0V": "PSDV40.0"
        "41.0V": "PSDV41.0"
        "42.0V": "PSDV42.0"
        "43.0V": "PSDV43.0"
        "44.0V": "PSDV44.0"
      statusmap:
        "40.0": "40.0V"
        "41.0": "41.0V"
        "42.0": "42.0V"
        "43.0": "43.0V"
        "44.0": "44.0V"
    battery_bulk_voltage:
      name: "battery bulk voltage"
      optionsmap:
        "56.4V": "PCVV56.4"
        "57.6V": "PCVV57.6"
        "58.4V": "PCVV58.4"
      statusmap:
        "56.4": "56.4V"
        "57.6": "57.6V"
        "58.4": "58.4V"
    battery_float_voltage:
      name: "battery float voltage"
      optionsmap:
        "54.0V": "PBFT54.0"
        "55.2V": "PBFT55.2"
        "56.4V": "PBFT56.4"
        "57.6V": "PBFT57.6"
      statusmap:
        "54.0": "54.0V"
        "55.2": "55.2V"
        "56.4": "56.4V"
        "57.6": "57.6V"
    battery_max_bulk_charging_time:
      name: "battery max bulk charging time"
      optionsmap:
        "60min": "PCVT060"
        "120min": "PCVT120"
        "180min": "PCVT180"
        "240min": "PCVT240"
      statusmap:
        "60": "60min"
        "120": "120min"
        "180": "180min"
        "240": "240min"
    max_discharging_current:
      name: "max discharging current"
      optionsmap:
        "0A (disabled)": "PBATMAXDISC000"
        "10A": "PBATMAXDISC010"
        "20A": "PBATMAXDISC020"
        "30A": "PBATMAXDISC030"
        "40A": "PBATMAXDISC040"
        "50A": "PBATMAXDISC050"
      statusmap:
        "0": "0A (disabled)"
        "10": "10A"
        "20": "20A"
        "30": "30A"
        "40": "40A"
        "50": "50A"
    bms_values:
      name: "bms values"
      optionsmap:
        "1 100 0 1 1 560 560 480 500 500": "PBMS1 100 0 1 1 560 560 480 500 500"

switch:
  - platform: pip8048
    pipsolar_id: inverter0
    output_source_priority_utility:
      name: "output source priority utility"
    output_source_priority_solar:
      name: "output source priority solar"
    output_source_priority_battery:
      name: "output source priority battery"
    input_voltage_range:
      name: "input voltage range"
    pv_ok_condition_for_parallel:
      name: "pv ok condition for parallel"
    pv_power_balance:
      name: "pv power balance"

output:
  - platform: pip8048
    pipsolar_id: inverter0
    battery_recharge_voltage:
      id: inverter0_battery_recharge_voltage_out
  - platform: pip8048
    pipsolar_id: inverter0
    battery_bulk_voltage:
      id: inverter0_battery_bulk_voltage_out
