text_sensor:
  - platform: pip8048
    pipsolar_id: inverter0
    device_mode:
      name: "device_mode"
      filters:
        map:
          - P -> Power on mode
          - S -> Standby mode
          - L -> Line mode
          - B -> Battery mode
          - F -> Fault mode
          - D -> Shutdown mode
