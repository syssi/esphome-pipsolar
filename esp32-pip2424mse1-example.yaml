#      name: "last qbatcd"

binary_sensor:
  - platform: pip2424mse1
    pipsolar_id: inverter0
    add_sbu_priority_version:
      name: "add sbu priority version"
    configuration_status:
      name: "configuration status"
#    scc_firmware_version:
#      name: "scc firmware version"
    load_status:
      name: "load status"
    battery_voltage_to_steady_while_charging:
      name: "battery voltage to steady while charging"
    charging_status:
      name: "charging status"
    scc_charging_status:
      name: "scc charging status"
    ac_charging_status:
      name: "ac charging status"
    charging_to_floating_mode:
      name: "charging to floating mode"
    switch_on:
      name: "switch on"
#    dustproof_installed:
#      name: "dustproof installed"
    silence_buzzer_open_buzzer:
      name: "silence buzzer open buzzer"
    overload_bypass_function:
      name: "overload bypass function"
    lcd_escape_to_default:
      name: "lcd escape to default"
    overload_restart_function:
      name: "overload restart function"
    over_temperature_restart_function:
      name: "over temperature restart function"
#    backlight_on:
#      name: "backlight on"
    # QBATCD
    discharge_onoff:
      name: "discharge onoff"
    discharge_with_standby_onoff:
      name: "discharge with standby onoff"
    charge_onoff:
      name: "charge onoff"

select:
  - platform: pip2424mse1
    pipsolar_id: inverter0
    output_source_priority:
      name: "output source priority"
      optionsmap:
        "Utility first": "POP00"
        "Solar first": "POP01"
        "SBU first": "POP02"
      statusmap:
        "0": "Utility first"
        "1": "Solar first"
        "2": "SBU first"
    charging_discharging_control:
      name: "charging discharging control"
      optionsmap:
        "Charge and discharge enabled": "PBATCD111"
        "Discharge only": "PBATCD110"
        "Charge only": "PBATCD001"
        "Disabled": "PBATCD000"
      statusmap:
        "(111": "Charge and discharge enabled"
        "(110": "Discharge only"
        "(001": "Charge only"
        "(000": "Disabled"

switch:
  - platform: pip2424mse1
    pipsolar_id: inverter0
    output_source_priority_utility:
      name: "output source priority utility"
    output_source_priority_solar:
      name: "output source priority solar"
    output_source_priority_battery:
      name: "output source priority battery"
    input_voltage_range:
      name: "input voltage range"
    pv_ok_condition_for_parallel:
      name: "pv ok condition for parallel"
    pv_power_balance:
      name: "pv power balance"

output:
  - platform: pip2424mse1
    pipsolar_id: inverter0
    battery_recharge_voltage:
      id: inverter0_battery_recharge_voltage_out
