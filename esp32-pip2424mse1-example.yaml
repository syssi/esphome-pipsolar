text_sensor:
  - platform: pip2424mse1
    pipsolar_id: inverter0
    device_mode:
      name: "device mode"
      filters:
        map:
          - P -> Power on mode
          - S -> Standby mode
          - L -> Line mode
          - B -> Battery mode
          - F -> Fault mode
          - D -> Shutdown mode
#    last_qpigs:
#      name: "last qpigs"
#    last_qpiri:
